<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Singularity | GPU-Optimized</title>
    <style>
        /* Force GPU Acceleration */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { 
            background: #030303; color: #f5f2eb; 
            height: 600vw; overflow-x: hidden;
            /* Prevent repaint lag */
            will-change: transform;
        }

        #viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 1000px; overflow: hidden;
        }
        #scene {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
            /* Hardware acceleration trigger */
            will-change: transform;
        }

        .artifact {
            position: absolute; top: 50%; left: 50%; 
            width: 80vw; height: 60vh;
            display: flex; align-items: center; justify-content: space-between;
            /* GPU Optimization */
            transform-style: preserve-3d;
            backface-visibility: hidden;
            will-change: opacity, transform;
        }

        .image-pod {
            width: 35vw; height: 50vh; position: relative;
            background: #111;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            /* GPU Acceleration */
            will-change: transform;
        }

        img { width: 100%; height: 100%; object-fit: cover; }

        /* The smoothest transition logic */
        .artifact { opacity: 0; transition: opacity 0.3s linear; }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="scene">
            <section class="artifact" id="art-1" style="transform: translateZ(-2000px);">
                <div class="image-pod"><img src="AbmCfZ2 - Imgur.jpg"></div>
                <div style="width: 40vw;"><h1>The Pull</h1></div>
            </section>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        let currentZ = 0;
        let targetZ = 0;

        // Use high-performance scroll interpolation
        window.addEventListener('wheel', (e) => {
            targetZ += e.deltaY * 2;
        }, { passive: true });

        function animate() {
            // Lerp (Linear Interpolation) for buttery smoothness
            currentZ += (targetZ - currentZ) * 0.05;
            scene.style.transform = `translateZ(${currentZ}px)`;
            
            // Performant opacity management
            document.querySelectorAll('.artifact').forEach(art => {
                const z = parseFloat(art.style.transform.match(/-?\d+/)[0]);
                const dist = Math.abs(currentZ - z);
                art.style.opacity = dist < 1500 ? 1 : 0;
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
